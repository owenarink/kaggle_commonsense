<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000" fill="none"><defs><style>text { font-family: 'RODE Noto Sans CJK SC B', 'RODE Noto Sans CJK SC B', sans-serif; fill: #4C2A85; } .t { font-size: 26px; font-weight: 800; } .b { font-size: 18px; font-weight: 760; } .s { font-size: 15px; font-weight: 600; fill: #6B4A98; } .w { fill: white; }</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#8A4DFF"/></marker></defs><text x="40" y="44" class="t">Transformer BBPE Architecture</text><rect x="80" y="180" rx="18" width="220" height="110" fill="#4C2A85"/><text x="123" y="225" class="b w">Grouped BBPE Input</text><text x="113" y="252" class="s">3 option pairs × 128 tokens</text><rect x="360" y="180" rx="18" width="220" height="110" fill="#F6EFFF" stroke="#D9C6F7" stroke-width="2"/><text x="410" y="224" class="b">Token + Position</text><text x="430" y="251" class="b">Embeddings</text><rect x="640" y="180" rx="18" width="220" height="110" fill="#EAD9FF" stroke="#B48CF2" stroke-width="2"/><text x="690" y="224" class="b">Multi-Head</text><text x="706" y="251" class="b">Self-Attention</text><rect x="920" y="180" rx="18" width="220" height="110" fill="#F6EFFF" stroke="#D9C6F7" stroke-width="2"/><text x="979" y="224" class="b">Feed-Forward</text><text x="998" y="251" class="b">Network</text><rect x="1200" y="180" rx="18" width="220" height="110" fill="#EAD9FF" stroke="#B48CF2" stroke-width="2"/><text x="1255" y="224" class="b">Residual +</text><text x="1280" y="251" class="b">LayerNorm</text><rect x="1480" y="180" rx="18" width="220" height="110" fill="#4C2A85"/><text x="1530" y="225" class="b w">MLP Classifier</text><text x="1547" y="252" class="s">scores A / B / C</text><path d="M300 235 H360" stroke="#8A4DFF" stroke-width="4" marker-end="url(#arrow)"/><path d="M580 235 H640" stroke="#8A4DFF" stroke-width="4" marker-end="url(#arrow)"/><path d="M860 235 H920" stroke="#8A4DFF" stroke-width="4" marker-end="url(#arrow)"/><path d="M1140 235 H1200" stroke="#8A4DFF" stroke-width="4" marker-end="url(#arrow)"/><path d="M1420 235 H1480" stroke="#8A4DFF" stroke-width="4" marker-end="url(#arrow)"/><rect x="640" y="320" rx="12" width="780" height="44" fill="#FFFDFE" stroke="#E5D4FA" stroke-width="1.5"/><text x="665" y="348" class="s">Encoder block is repeated 4 times with 8 attention heads and model dimension 256.</text><path d="M1310 290 V390 H750 V300" stroke="#B48CF2" stroke-width="2" stroke-dasharray="8 6" fill="none" marker-end="url(#arrow)"/><rect x="620" y="470" rx="12" width="520" height="48" fill="#FCF9FF" stroke="#D9C6F7" stroke-width="1.5"/><text x="790" y="501" class="b">Attention Types</text><rect x="650" y="550" rx="14" width="150" height="80" fill="#F6EFFF" stroke="#D9C6F7" stroke-width="2"/><text x="672" y="596" class="b">Content → Content</text><rect x="805" y="550" rx="14" width="150" height="80" fill="#EAD9FF" stroke="#B48CF2" stroke-width="2"/><text x="824" y="596" class="b">Content → Position</text><rect x="960" y="550" rx="14" width="150" height="80" fill="#F6EFFF" stroke="#D9C6F7" stroke-width="2"/><text x="980" y="596" class="b">Position → Content</text><path d="M800 590 H805" stroke="#8A4DFF" stroke-width="4" marker-end="url(#arrow)"/><path d="M955 590 H960" stroke="#8A4DFF" stroke-width="4" marker-end="url(#arrow)"/><rect x="650" y="655" rx="12" width="460" height="54" fill="#FFFDFE" stroke="#E5D4FA" stroke-width="1.5"/><text x="665" y="688" class="s">Disentangled attention score combines semantic similarity and relative position interactions.</text><rect x="1240" y="550" rx="14" width="170" height="80" fill="#F6EFFF" stroke="#D9C6F7" stroke-width="2"/><text x="1281" y="596" class="b">Mean Pooling</text><rect x="1460" y="550" rx="14" width="220" height="80" fill="#EAD9FF" stroke="#B48CF2" stroke-width="2"/><text x="1492" y="586" class="b">Categorical</text><text x="1481" y="612" class="b">Cross-Entropy</text><path d="M1590 290 V480 H1325 V550" stroke="#8A4DFF" stroke-width="4" fill="none" marker-end="url(#arrow)"/><path d="M1410 590 H1460" stroke="#8A4DFF" stroke-width="4" marker-end="url(#arrow)"/><rect x="1240" y="655" rx="12" width="440" height="54" fill="#FFFDFE" stroke="#E5D4FA" stroke-width="1.5"/><text x="1255" y="688" class="s">Softmax over the 3 option scores gives the final prediction.</text><text x="80" y="790" class="t" style="font-size:22px;">Legend</text><rect x="80" y="840" rx="12" width="280" height="42" fill="#FFFFFF" stroke="#E5D4FA" stroke-width="1.5"/><text x="102" y="867" class="s">Dark blocks = input/output stages</text><rect x="380" y="840" rx="12" width="360" height="42" fill="#FFFFFF" stroke="#E5D4FA" stroke-width="1.5"/><text x="402" y="867" class="s">Light blocks = internal transformer operations</text><rect x="760" y="840" rx="12" width="330" height="42" fill="#FFFFFF" stroke="#E5D4FA" stroke-width="1.5"/><text x="782" y="867" class="s">Purple arrows = data flow / scoring flow</text><rect x="1110" y="840" rx="12" width="320" height="42" fill="#FFFFFF" stroke="#E5D4FA" stroke-width="1.5"/><text x="1132" y="867" class="s">Dashed arrow = repeated encoder stack</text><rect x="80" y="900" rx="12" width="570" height="42" fill="#FFFFFF" stroke="#E5D4FA" stroke-width="1.5"/><text x="102" y="927" class="s">Attention types: c2c, c2p, p2c are scored separately before softmax.</text><rect x="670" y="900" rx="12" width="610" height="42" fill="#FFFFFF" stroke="#E5D4FA" stroke-width="1.5"/><text x="692" y="927" class="s">Model setting: 4 layers, 8 heads, model dim 256, grouped input [3,128].</text><rect x="1300" y="900" rx="12" width="400" height="42" fill="#FFFFFF" stroke="#E5D4FA" stroke-width="1.5"/><text x="1322" y="927" class="s">Final output: one score per option, then choose A / B / C.</text></svg>