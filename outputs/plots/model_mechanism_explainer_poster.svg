<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1380" viewBox="0 0 1800 1380" fill="none"><defs><linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.84"/><stop offset="100%" stop-color="#FAF6FF" stop-opacity="0.74"/></linearGradient><linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#C08BFF"/><stop offset="100%" stop-color="#8A4DFF"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#3D1F70" flood-opacity="0.12"/></filter><style>text { font-family: 'RODE Noto Sans CJK SC B', 'RODE Noto Sans CJK SC B', sans-serif; fill: #4C2A85; } .title { font-size: 54px; font-weight: 800; letter-spacing: -0.03em; } .section { font-size: 28px; font-weight: 760; } .body { font-size: 20px; font-weight: 520; fill: #5F3A9B; } .small { font-size: 17px; font-weight: 600; fill: #7E68A8; } .equation { font-size: 22px; font-weight: 650; fill: #3D1F70; } .label { font-size: 16px; font-weight: 760; fill: white; }</style></defs><g filter="url(#shadow)"><rect x="40" y="40" rx="34" width="1720" height="1300" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.6"/></g><text x="92" y="118" class="title">Model Mechanism</text><rect x="92" y="158" rx="26" width="1616" height="460" fill="#FFFFFF" fill-opacity="0.62" stroke="#E5D4FA"/><text x="124" y="206" class="section">Architecture</text><text x="124" y="238" class="small">Aligned Transformer BBPE architecture with arrows and a more detailed legend.</text><rect x="124" y="270" rx="22" width="1552" height="315" fill="#FBF8FF" stroke="#E5D4FA"/><image x="150" y="280" width="1500" height="300" href="data:image/svg+xml;base64," preserveAspectRatio="xMidYMid meet"/><rect x="92" y="646" rx="26" width="1616" height="244" fill="#FFFFFF" fill-opacity="0.62" stroke="#E5D4FA"/><text x="124" y="694" class="section">Transformer Encoder Stack</text><text x="124" y="726" class="small">General layer explanation for the model pipeline</text><rect x="126" y="776" rx="18" width="180" height="72" fill="#3D1F70"/><text x="179" y="820" class="label">Token IDs</text><path d="M306 812 L358 812" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/><polygon points="358,812 340,801 340,823" fill="#8A4DFF"/><rect x="376" y="758" rx="18" width="220" height="108" fill="#F7F1FF" stroke="#E5D4FA"/><text x="418" y="798" class="body">Embeddings</text><text x="406" y="830" class="small">content + relative position</text><path d="M596 812 L650 812" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/><polygon points="650,812 632,801 632,823" fill="#8A4DFF"/><rect x="668" y="740" rx="18" width="360" height="144" fill="#FBF8FF" stroke="#E5D4FA"/><text x="742" y="780" class="body">4× Encoder Blocks</text><text x="722" y="812" class="small">multi-head self-attention</text><text x="722" y="842" class="small">feed-forward network</text><text x="722" y="872" class="small">residual + layer norm</text><path d="M1028 812 L1082 812" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/><polygon points="1082,812 1064,801 1064,823" fill="#8A4DFF"/><rect x="1100" y="776" rx="18" width="190" height="72" fill="#F7F1FF" stroke="#E5D4FA"/><text x="1152" y="820" class="body">Pooling</text><path d="M1290 812 L1344 812" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/><polygon points="1344,812 1326,801 1326,823" fill="#8A4DFF"/><rect x="1362" y="776" rx="18" width="154" height="72" fill="#3D1F70"/><text x="1416" y="820" class="label">MLP</text><path d="M1516 812 L1566 812" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/><polygon points="1566,812 1548,801 1548,823" fill="#8A4DFF"/><rect x="1584" y="776" rx="18" width="90" height="72" fill="#F7F1FF" stroke="#E5D4FA"/><text x="1608" y="820" class="body">A/B/C</text><rect x="92" y="918" rx="26" width="776" height="372" fill="#FFFFFF" fill-opacity="0.62" stroke="#E5D4FA"/><text x="124" y="966" class="section">Relative Position Embeddings</text><text x="124" y="1006" class="body">The model compares token meaning and token distance at the same time.</text><text x="124" y="1042" class="body">This matters for short commonsense statements where local relations and order drive the label.</text><rect x="126" y="1072" rx="18" width="708" height="184" fill="#FBF8FF" stroke="#E5D4FA"/><text x="156" y="1116" class="equation">r_ij = position(j - i)</text><text x="156" y="1160" class="body">A learned vector represents how far token j is from token i.</text><text x="156" y="1196" class="small">Example: “rises” and “west” are not only different words, but occupy a meaningful relative configuration.</text><rect x="900" y="918" rx="26" width="808" height="372" fill="#FFFFFF" fill-opacity="0.62" stroke="#E5D4FA"/><text x="932" y="966" class="section">Disentangled Attention</text><text x="932" y="1006" class="body">AttentionTypes separates content and position into three score components.</text><rect x="932" y="1038" rx="18" width="744" height="118" fill="#F7F1FF" stroke="#E5D4FA"/><text x="964" y="1082" class="equation">s_ij = ( q_i^T k_j + q_i^T p^K_ij + p^Q_ij^T k_j ) / √(3 d_h)</text><text x="964" y="1120" class="small">content→content          content→position          position→content</text><rect x="932" y="1180" rx="16" width="226" height="76" fill="#FBF8FF" stroke="#E5D4FA"/><text x="962" y="1224" class="body">Content → Content</text><rect x="1180" y="1180" rx="16" width="226" height="76" fill="#FBF8FF" stroke="#E5D4FA"/><text x="1206" y="1224" class="body">Content → Position</text><rect x="1428" y="1180" rx="16" width="226" height="76" fill="#FBF8FF" stroke="#E5D4FA"/><text x="1456" y="1224" class="body">Position → Content</text></svg>