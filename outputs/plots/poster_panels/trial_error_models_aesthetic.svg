<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1320" viewBox="0 0 1800 1320" fill="none">
<defs>
  <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.82"/>
    <stop offset="100%" stop-color="#FAF6FF" stop-opacity="0.76"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#3D1F70" flood-opacity="0.12"/>
  </filter>
  <style>
    text { font-family: 'RODE Noto Sans CJK SC B', sans-serif; fill: #181A20; }
    .title { font-size: 48px; font-weight: 800; }
    .section { font-size: 24px; font-weight: 760; }
    .body { font-size: 18px; font-weight: 520; fill: #4F5462; }
    .small { font-size: 16px; font-weight: 600; fill: #766D89; }
    .score { font-size: 30px; font-weight: 820; fill: #6D28D9; }
    .best { font-size: 30px; font-weight: 820; fill: #FFFFFF; }
  </style>
</defs>
<g filter="url(#shadow)"><rect x="40" y="40" rx="34" width="1720" height="1240" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.5"/></g>
<text x="80" y="112" class="title">Trial &amp; Error</text>
<text x="80" y="148" class="small">What we tried, the theory behind it, and why the best model remained the original AttentionTypes baseline.</text>

<rect x="80" y="190" rx="28" width="1640" height="230" fill="#FFFFFF" fill-opacity="0.68" stroke="#E5D4FA"/>
<text x="110" y="236" class="section">Baseline → Transformer → DeBERTa-style progression</text>
<rect x="110" y="266" rx="18" width="250" height="120" fill="#F7F1FF" stroke="#E5D4FA"/>
<text x="132" y="304" class="section" style="font-size:20px;">MLP + TF-IDF</text>
<text x="132" y="334" class="body">Lexical baseline over sparse features</text>
<text x="132" y="362" class="score">0.3338</text>

<rect x="390" y="266" rx="18" width="250" height="120" fill="#F7F1FF" stroke="#E5D4FA"/>
<text x="412" y="304" class="section" style="font-size:20px;">Pairwise MLP</text>
<text x="412" y="334" class="body">Scores each option separately</text>
<text x="412" y="362" class="score">0.7100</text>

<rect x="670" y="266" rx="18" width="250" height="120" fill="#F7F1FF" stroke="#E5D4FA"/>
<text x="692" y="304" class="section" style="font-size:20px;">Transformer BBPE</text>
<text x="692" y="334" class="body">Standard encoder with grouped BBPE input</text>
<text x="692" y="362" class="score">0.7300</text>

<rect x="950" y="252" rx="18" width="310" height="136" fill="#4C2A85" stroke="#4C2A85"/>
<text x="978" y="300" class="section" style="font-size:22px;fill:white;">AttentionTypes</text>
<text x="978" y="332" class="body" style="fill:#E9D5FF;">Disentangled attention: c2c + c2p + p2c</text>
<text x="978" y="366" class="best">0.7456</text>

<rect x="1290" y="266" rx="18" width="400" height="120" fill="#FCF9FF" stroke="#E5D4FA"/>
<text x="1314" y="302" class="section" style="font-size:20px;">Why it won</text>
<text x="1314" y="332" class="body">It adds relational bias without forcing extra hidden structure.</text>
<text x="1314" y="360" class="body">That fits short commonsense sentence repair well.</text>

<rect x="80" y="454" rx="28" width="1640" height="780" fill="#FFFFFF" fill-opacity="0.68" stroke="#E5D4FA"/>
<text x="110" y="500" class="section">Counterfactual model family</text>
<text x="110" y="532" class="small">These models try to represent not only which option is best, but why the false sentence should be repaired.</text>

<rect x="110" y="566" rx="22" width="500" height="190" fill="#F7F1FF" stroke="#E5D4FA"/>
<text x="138" y="604" class="section" style="font-size:21px;">Counterfactual Attention</text>
<text x="138" y="636" class="body">Theory: detect the anomalous part of the false sentence and learn which option tokens repair or explain it.</text>
<text x="138" y="682" class="body">This matches the task fairly well because one part of the sentence is often obviously wrong.</text>
<text x="138" y="724" class="score">0.7400</text>

<rect x="650" y="566" rx="22" width="500" height="190" fill="#F7F1FF" stroke="#E5D4FA"/>
<text x="678" y="604" class="section" style="font-size:21px;">Cross-Option Attention</text>
<text x="678" y="636" class="body">Theory: let answer options compete directly, so the model learns which repair is strongest relative to the alternatives.</text>
<text x="678" y="682" class="body">Useful when distractors are plausible, but the extra coupling adds complexity.</text>
<text x="678" y="724" class="score">0.7344</text>

<rect x="1190" y="566" rx="22" width="500" height="190" fill="#F7F1FF" stroke="#E5D4FA"/>
<text x="1218" y="604" class="section" style="font-size:21px;">Latent Edit Competition</text>
<text x="1218" y="636" class="body">Theory: infer a hidden edit that would turn the false sentence into a corrected latent representation.</text>
<text x="1218" y="682" class="body">In practice, this was too strong an assumption for our labels and overfit quickly.</text>
<text x="1218" y="724" class="score">0.7125</text>

<rect x="110" y="790" rx="22" width="1580" height="170" fill="#FCF9FF" stroke="#E5D4FA"/>
<text x="138" y="832" class="section" style="font-size:21px;">What we learned</text>
<text x="138" y="868" class="body">The dataset rewards strong relational encoding, but not every additional structural assumption helps.</text>
<text x="138" y="904" class="body">Counterfactual models are interesting because they try to model explanation and repair explicitly, but they can overfit when the supervision only gives the final answer label.</text>

<rect x="110" y="990" rx="22" width="1580" height="200" fill="#4C2A85" stroke="#4C2A85"/>
<text x="138" y="1034" class="section" style="font-size:22px;fill:white;">Final conclusion</text>
<text x="138" y="1072" class="body" style="fill:#E9D5FF;">We expected more task-specific attention to help, but the best-performing model was the one with the cleanest inductive bias: disentangled attention over grouped BBPE inputs.</text>
<text x="138" y="1114" class="body" style="fill:#E9D5FF;">This suggests that for our commonsense task, modeling content and relative position explicitly was more useful than adding complex repair machinery.</text>
</svg>