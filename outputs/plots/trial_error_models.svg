<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1280" viewBox="0 0 1800 1280" fill="none">
  <defs>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="55%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="panel2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#FAF5FF" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#3B0764" flood-opacity="0.14"/>
    </filter>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #201433; }
      .title { font-size: 52px; font-weight: 820; letter-spacing: -0.03em; }
      .subtitle { font-size: 22px; font-weight: 500; fill: #6D5C8A; }
      .head { font-size: 24px; font-weight: 760; }
      .body { font-size: 19px; font-weight: 520; fill: #46385F; }
      .small { font-size: 17px; font-weight: 600; fill: #7C6C9C; }
      .score { font-size: 30px; font-weight: 850; fill: #6D28D9; }
      .eq { font-family: 'Times New Roman', serif; font-size: 20px; font-style: italic; fill: #2E1065; }
      .pill { font-size: 17px; font-weight: 780; fill: white; }
    </style>
  </defs>
  <g filter="url(#shadow2)">
    <rect x="50" y="50" rx="34" width="1700" height="1180" fill="url(#panel2)" stroke="#FFFFFF" stroke-opacity="0.5"/>
  </g>
  <text x="100" y="128" class="title">Trial &amp; Error</text>
  <text x="100" y="168" class="subtitle">Models we tested, what they assume, and how they performed</text>

  <rect x="100" y="220" rx="26" width="1600" height="920" fill="#FFFFFF" fill-opacity="0.56" stroke="#E9D5FF"/>

  <rect x="130" y="255" rx="18" width="300" height="140" fill="#F5F3FF" stroke="#D8B4FE"/>
  <text x="155" y="295" class="head">MLP + TF-IDF</text>
  <text x="155" y="328" class="body">Bag-of-ngrams baseline</text>
  <text x="155" y="356" class="small">Linear-ish lexical separation</text>
  <text x="155" y="385" class="score">0.3338</text>

  <rect x="455" y="255" rx="18" width="300" height="140" fill="#F5F3FF" stroke="#D8B4FE"/>
  <text x="480" y="295" class="head">Pairwise MLP</text>
  <text x="480" y="328" class="body">Score each option separately</text>
  <text x="480" y="356" class="small">sigmoid(f(x_false, x_option))</text>
  <text x="480" y="385" class="score">0.7100</text>

  <rect x="780" y="255" rx="18" width="300" height="140" fill="#F5F3FF" stroke="#D8B4FE"/>
  <text x="805" y="295" class="head">TextCNN</text>
  <text x="805" y="328" class="body">Local n-gram pattern extractor</text>
  <text x="805" y="356" class="small">convolution + max pooling</text>
  <text x="805" y="385" class="score">0.6694</text>

  <rect x="1105" y="255" rx="18" width="270" height="140" fill="#F5F3FF" stroke="#D8B4FE"/>
  <text x="1130" y="295" class="head">Transformer</text>
  <text x="1130" y="328" class="body">BBPE + encoder</text>
  <text x="1130" y="356" class="small">softmax(QKᵀ/√d)V</text>
  <text x="1130" y="385" class="score">0.7300</text>

  <rect x="1400" y="255" rx="18" width="270" height="140" fill="#2A163F" stroke="#4C1D95"/>
  <text x="1425" y="295" style="font-size:24px;font-weight:760;fill:#F5F3FF;">AttentionTypes</text>
  <text x="1425" y="328" style="font-size:19px;font-weight:520;fill:#D8B4FE;">DeBERTa-like best model</text>
  <text x="1425" y="356" style="font-size:17px;font-weight:600;fill:#C4B5FD;">c2c + c2p + p2c</text>
  <text x="1425" y="385" style="font-size:30px;font-weight:850;fill:#F5F3FF;">0.7456</text>

  <rect x="130" y="440" rx="22" width="740" height="280" fill="#FAF5FF" stroke="#E9D5FF"/>
  <text x="160" y="485" class="head">Why AttentionTypes worked best</text>
  <text x="160" y="525" class="body">The dataset contains short, relational sentences where token meaning and relative position both matter.</text>
  <text x="160" y="565" class="eq">c2c: q_i^T k_j     c2p: q_i^T p^K_ij     p2c: p^Q_ij^T k_j</text>
  <text x="160" y="605" class="body">This disentangled attention matches the task better than either simple lexical baselines or more complex task-specific variants.</text>
  <text x="160" y="645" class="small">Interpretation: enough structure to model relations, without overfitting to hidden edit assumptions.</text>

  <rect x="900" y="440" rx="22" width="770" height="280" fill="#FDF4FF" stroke="#F0ABFC"/>
  <text x="930" y="485" class="head">Counterfactual family</text>
  <text x="930" y="525" class="body">Counterfactual attention: 0.7400</text>
  <text x="930" y="558" class="body">Cross-option attention: 0.7344</text>
  <text x="930" y="591" class="body">Latent edit competition: 0.7125</text>
  <text x="930" y="631" class="small">Theory: model anomalies, repairs, and option competition.</text>
  <text x="930" y="665" class="small">Observed outcome: more structure increased overfitting instead of generalization.</text>

  <rect x="130" y="760" rx="22" width="1540" height="330" fill="#FFFFFF" fill-opacity="0.62" stroke="#E9D5FF"/>
  <text x="160" y="805" class="head">Takeaways from trial and error</text>
  <circle cx="170" cy="855" r="7" fill="#A855F7"/>
  <text x="192" y="863" class="body">Adding model complexity did not automatically improve performance on this dataset.</text>
  <circle cx="170" cy="905" r="7" fill="#A855F7"/>
  <text x="192" y="913" class="body">Commonsense repair labels behave more like explanation selection than latent edit recovery.</text>
  <circle cx="170" cy="955" r="7" fill="#A855F7"/>
  <text x="192" y="963" class="body">The best model balanced relational inductive bias with enough simplicity to generalize.</text>
  <circle cx="170" cy="1005" r="7" fill="#A855F7"/>
  <text x="192" y="1013" class="body">Final conclusion: disentangled attention was the strongest improvement over the standard transformer baseline.</text>
</svg>