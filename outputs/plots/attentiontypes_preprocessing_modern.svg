<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" fill="none">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="55%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#FAF5FF" stop-opacity="0.68"/>
    </linearGradient>
    <linearGradient id="chipA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="chipB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
    <linearGradient id="chipC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#A21CAF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#3B0764" flood-opacity="0.16"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1F1335; }
      .title { font-size: 54px; font-weight: 800; letter-spacing: -0.03em; }
      .subtitle { font-size: 24px; font-weight: 500; fill: #6B5A89; }
      .section { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
      .body { font-size: 22px; font-weight: 500; fill: #46385F; }
      .small { font-size: 18px; font-weight: 600; fill: #7C6C9C; }
      .stepnum { font-size: 24px; font-weight: 800; fill: white; }
      .stephead { font-size: 22px; font-weight: 750; }
      .stepdesc { font-size: 18px; font-weight: 500; fill: #5F4D7C; }
      .mono { font-family: 'SF Mono', 'JetBrains Mono', 'Menlo', monospace; font-size: 18px; font-weight: 600; fill: #F3E8FF; }
      .token { font-family: 'SF Mono', 'JetBrains Mono', 'Menlo', monospace; font-size: 17px; font-weight: 700; }
    </style>
  </defs>

  <g opacity="0.95">
    <circle cx="220" cy="110" r="140" fill="#DDD6FE" fill-opacity="0.28" filter="url(#soft)"/>
    <circle cx="1590" cy="150" r="170" fill="#C4B5FD" fill-opacity="0.22" filter="url(#soft)"/>
    <circle cx="1470" cy="850" r="210" fill="#E9D5FF" fill-opacity="0.22" filter="url(#soft)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="70" rx="34" ry="34" width="1660" height="840" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.55"/>
  </g>

  <text x="120" y="148" class="title">Preprocessing</text>
  <text x="120" y="190" class="subtitle">Grouped BBPE encoding of one false sentence with three candidate answers</text>

  <rect x="120" y="250" rx="28" width="470" height="580" fill="#FFFFFF" fill-opacity="0.58" stroke="#E9D5FF"/>
  <text x="155" y="305" class="section">Raw Example</text>

  <rect x="155" y="338" rx="20" width="400" height="110" fill="#FDF2F8" stroke="#F5C2E7"/>
  <text x="182" y="375" class="small">False sentence</text>
  <text x="182" y="415" class="body">“The sun rises in the west.”</text>

  <rect x="155" y="478" rx="18" width="400" height="82" fill="#F5F3FF" stroke="#C4B5FD"/>
  <circle cx="198" cy="519" r="20" fill="url(#chipA)"/>
  <text x="191" y="527" style="font-size:18px;font-weight:800;fill:white;">A</text>
  <text x="232" y="526" class="body">The sun rises in the east</text>

  <rect x="155" y="578" rx="18" width="400" height="82" fill="#FAF5FF" stroke="#D8B4FE"/>
  <circle cx="198" cy="619" r="20" fill="url(#chipB)"/>
  <text x="191" y="627" style="font-size:18px;font-weight:800;fill:white;">B</text>
  <text x="232" y="626" class="body">The sun sets in the west</text>

  <rect x="155" y="678" rx="18" width="400" height="82" fill="#FDF4FF" stroke="#F0ABFC"/>
  <circle cx="198" cy="719" r="20" fill="url(#chipC)"/>
  <text x="191" y="727" style="font-size:18px;font-weight:800;fill:white;">C</text>
  <text x="232" y="726" class="body">The sun shines at night</text>

  <rect x="155" y="780" rx="18" width="230" height="38" fill="#EDE9FE"/>
  <text x="180" y="806" style="font-size:20px;font-weight:800;fill:#6D28D9;">Label: A → 0</text>

  <rect x="650" y="250" rx="28" width="500" height="580" fill="#FFFFFF" fill-opacity="0.58" stroke="#E9D5FF"/>
  <text x="685" y="305" class="section">Pipeline</text>

  <g>
    <rect x="685" y="340" rx="18" width="430" height="76" fill="#FCFAFF" stroke="#E9D5FF"/>
    <circle cx="723" cy="378" r="22" fill="url(#accent)"/>
    <text x="716" y="386" class="stepnum">1</text>
    <text x="760" y="372" class="stephead">Clean text</text>
    <text x="760" y="396" class="stepdesc">Strip whitespace, preserve wording</text>
    <path d="M900 422 L900 452" stroke="#B8A8D6" stroke-width="4" stroke-linecap="round"/>
    <path d="M900 459 L888 441 L912 441 Z" fill="#B8A8D6"/>

    <rect x="685" y="462" rx="18" width="430" height="76" fill="#FCFAFF" stroke="#E9D5FF"/>
    <circle cx="723" cy="500" r="22" fill="url(#accent)"/>
    <text x="716" y="508" class="stepnum">2</text>
    <text x="760" y="494" class="stephead">Create 3 pairs</text>
    <text x="760" y="518" class="stepdesc">(FalseSent, A), (FalseSent, B), (FalseSent, C)</text>
    <path d="M900 544 L900 574" stroke="#B8A8D6" stroke-width="4" stroke-linecap="round"/>
    <path d="M900 581 L888 563 L912 563 Z" fill="#B8A8D6"/>

    <rect x="685" y="584" rx="18" width="430" height="76" fill="#FCFAFF" stroke="#E9D5FF"/>
    <circle cx="723" cy="622" r="22" fill="url(#accent)"/>
    <text x="716" y="630" class="stepnum">3</text>
    <text x="760" y="616" class="stephead">BBPE tokenize</text>
    <text x="760" y="640" class="stepdesc">Byte-level subword segmentation</text>
    <path d="M900 666 L900 696" stroke="#B8A8D6" stroke-width="4" stroke-linecap="round"/>
    <path d="M900 703 L888 685 L912 685 Z" fill="#B8A8D6"/>

    <rect x="685" y="706" rx="18" width="430" height="76" fill="#FCFAFF" stroke="#E9D5FF"/>
    <circle cx="723" cy="744" r="22" fill="url(#accent)"/>
    <text x="716" y="752" class="stepnum">4</text>
    <text x="760" y="738" class="stephead">Add special tokens</text>
    <text x="760" y="762" class="stepdesc">&lt;cls&gt; false sentence &lt;sep&gt; option &lt;eos&gt;</text>
  </g>

  <rect x="1210" y="250" rx="28" width="470" height="580" fill="#2A163F" fill-opacity="0.94" stroke="#4C1D95"/>
  <text x="1245" y="305" style="font-size:24px;font-weight:750;fill:#F5F3FF;">Encoded BBPE Pairs</text>
  <text x="1245" y="340" style="font-size:18px;font-weight:600;fill:#C4B5FD;">Each answer becomes one grouped input row</text>

  <rect x="1245" y="375" rx="18" width="400" height="112" fill="#341B52" stroke="#4C1D95"/>
  <text x="1270" y="408" class="token" fill="#A78BFA">A</text>
  <text x="1300" y="408" class="mono">&lt;cls&gt; the sun rises in the west .</text>
  <text x="1270" y="438" class="mono">&lt;sep&gt; the sun rises in the east &lt;eos&gt;</text>

  <rect x="1245" y="513" rx="18" width="400" height="112" fill="#341B52" stroke="#4C1D95"/>
  <text x="1270" y="546" class="token" fill="#C084FC">B</text>
  <text x="1300" y="546" class="mono">&lt;cls&gt; the sun rises in the west .</text>
  <text x="1270" y="576" class="mono">&lt;sep&gt; the sun sets in the west &lt;eos&gt;</text>

  <rect x="1245" y="651" rx="18" width="400" height="112" fill="#341B52" stroke="#4C1D95"/>
  <text x="1270" y="684" class="token" fill="#E879F9">C</text>
  <text x="1300" y="684" class="mono">&lt;cls&gt; the sun rises in the west .</text>
  <text x="1270" y="714" class="mono">&lt;sep&gt; the sun shines at night &lt;eos&gt;</text>

  <rect x="120" y="860" rx="24" width="1560" height="82" fill="url(#accent)" fill-opacity="0.12" stroke="#D8B4FE"/>
  <text x="155" y="912" class="body" style="font-size:26px;font-weight:750;fill:#1F1335;">Final grouped model input:  [3, 128]   →   3 BBPE-tokenized sentence-option pairs, padded to 128 tokens each</text>
</svg>