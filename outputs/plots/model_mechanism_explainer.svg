<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1220" viewBox="0 0 1800 1220" fill="none">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="55%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#FAF5FF" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#3B0764" flood-opacity="0.14"/>
    </filter>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #201433; }
      .title { font-size: 52px; font-weight: 820; letter-spacing: -0.03em; }
      .subtitle { font-size: 22px; font-weight: 500; fill: #6D5C8A; }
      .section { font-size: 28px; font-weight: 760; letter-spacing: -0.02em; }
      .body { font-size: 21px; font-weight: 520; fill: #46385F; }
      .small { font-size: 18px; font-weight: 600; fill: #7C6C9C; }
      .mono { font-family: 'SF Mono', 'JetBrains Mono', 'Menlo', monospace; font-size: 16px; font-weight: 650; fill: #F3E8FF; }
      .eq { font-family: 'Times New Roman', serif; font-size: 24px; font-style: italic; fill: #2E1065; }
      .chip { font-size: 18px; font-weight: 800; fill: white; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect x="50" y="50" rx="34" width="1700" height="1120" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.5"/>
  </g>

  <text x="100" y="128" class="title">How The AttentionTypes Model Works</text>
  <text x="100" y="168" class="subtitle">Add this next to the architecture graphic: layers, attention mechanism, and final training objective</text>

  <rect x="100" y="220" rx="26" width="1600" height="250" fill="#FFFFFF" fill-opacity="0.58" stroke="#E9D5FF"/>
  <text x="130" y="270" class="section">End-to-end flow</text>

  <rect x="130" y="315" rx="18" width="190" height="95" fill="#2A163F" stroke="#4C1D95"/>
  <text x="174" y="352" style="font-size:22px;font-weight:760;fill:#F5F3FF;">BBPE</text>
  <text x="164" y="381" class="mono">tokenization</text>
  <path d="M320 363 L390 363" stroke="#A855F7" stroke-width="6" stroke-linecap="round"/>

  <rect x="390" y="315" rx="18" width="220" height="95" fill="#F5F3FF" stroke="#D8B4FE"/>
  <text x="430" y="352" class="body">Embedding +</text>
  <text x="430" y="382" class="body">relative positions</text>
  <path d="M610 363 L680 363" stroke="#A855F7" stroke-width="6" stroke-linecap="round"/>

  <rect x="680" y="295" rx="18" width="340" height="135" fill="#FDF4FF" stroke="#F0ABFC"/>
  <text x="718" y="334" class="body">4× Transformer encoder blocks</text>
  <text x="718" y="367" class="small">8 heads · model dim 256</text>
  <text x="718" y="398" class="small">self-attention + FFN + residual + layer norm</text>
  <path d="M1020 363 L1090 363" stroke="#A855F7" stroke-width="6" stroke-linecap="round"/>

  <rect x="1090" y="315" rx="18" width="190" height="95" fill="#F5F3FF" stroke="#D8B4FE"/>
  <text x="1140" y="352" class="body">Mean</text>
  <text x="1132" y="382" class="body">pooling</text>
  <path d="M1280 363 L1350 363" stroke="#A855F7" stroke-width="6" stroke-linecap="round"/>

  <rect x="1350" y="315" rx="18" width="150" height="95" fill="#2A163F" stroke="#4C1D95"/>
  <text x="1401" y="352" style="font-size:22px;font-weight:760;fill:#F5F3FF;">MLP</text>
  <text x="1388" y="381" class="mono">option score</text>
  <path d="M1500 363 L1570 363" stroke="#A855F7" stroke-width="6" stroke-linecap="round"/>

  <rect x="1570" y="315" rx="18" width="100" height="95" fill="#F5F3FF" stroke="#D8B4FE"/>
  <text x="1593" y="355" class="body">A/B/C</text>
  <text x="1598" y="384" class="small">pick</text>

  <rect x="100" y="500" rx="26" width="780" height="300" fill="#FFFFFF" fill-opacity="0.58" stroke="#E9D5FF"/>
  <text x="130" y="550" class="section">Disentangled attention</text>
  <text x="130" y="592" class="eq">s_ij = ( q_i^T k_j + q_i^T p^K_ij + p^Q_ij^T k_j ) / √(3 d_h)</text>
  <text x="130" y="632" class="small">content→content          content→position          position→content</text>

  <rect x="130" y="665" rx="16" width="225" height="92" fill="#F5F3FF" stroke="#D8B4FE"/>
  <text x="160" y="702" class="body">Content → Content</text>
  <text x="160" y="730" class="small">semantic similarity between tokens</text>

  <rect x="378" y="665" rx="16" width="225" height="92" fill="#FAF5FF" stroke="#E9D5FF"/>
  <text x="403" y="702" class="body">Content → Position</text>
  <text x="403" y="730" class="small">how token meaning relates to relative position</text>

  <rect x="626" y="665" rx="16" width="225" height="92" fill="#FDF4FF" stroke="#F0ABFC"/>
  <text x="651" y="702" class="body">Position → Content</text>
  <text x="651" y="730" class="small">how position patterns attend to token content</text>

  <rect x="920" y="500" rx="26" width="780" height="300" fill="#FFFFFF" fill-opacity="0.58" stroke="#E9D5FF"/>
  <text x="950" y="550" class="section">Transformer encoder stack</text>
  <rect x="950" y="590" rx="16" width="720" height="150" fill="#2A163F" stroke="#4C1D95"/>
  <rect x="980" y="635" rx="12" width="120" height="58" fill="#7C3AED" fill-opacity="0.35" stroke="#C4B5FD"/>
  <text x="1008" y="670" class="chip">Input</text>
  <path d="M1100 664 L1160 664" stroke="#C4B5FD" stroke-width="5" stroke-linecap="round"/>
  <rect x="1160" y="620" rx="12" width="150" height="88" fill="#A855F7" fill-opacity="0.28" stroke="#C4B5FD"/>
  <text x="1184" y="655" class="chip">Multi-head</text>
  <text x="1196" y="682" class="mono">attention</text>
  <path d="M1310 664 L1370 664" stroke="#C4B5FD" stroke-width="5" stroke-linecap="round"/>
  <rect x="1370" y="620" rx="12" width="120" height="88" fill="#A855F7" fill-opacity="0.22" stroke="#C4B5FD"/>
  <text x="1403" y="655" class="chip">FFN</text>
  <text x="1386" y="682" class="mono">feed-forward</text>
  <path d="M1490 664 L1550 664" stroke="#C4B5FD" stroke-width="5" stroke-linecap="round"/>
  <rect x="1550" y="620" rx="12" width="90" height="88" fill="#7C3AED" fill-opacity="0.35" stroke="#C4B5FD"/>
  <text x="1569" y="655" class="chip">Norm</text>
  <text x="1575" y="682" class="mono">+ skip</text>
  <text x="950" y="770" class="small">Repeated 4 times: self-attention, positionwise FFN, residual connection, and layer normalization.</text>

  <rect x="100" y="840" rx="26" width="1600" height="280" fill="#FFFFFF" fill-opacity="0.58" stroke="#E9D5FF"/>
  <text x="130" y="890" class="section">Training objective</text>
  <text x="130" y="930" class="eq">L = - Σ_c y_c log( p_c ) ,    p = softmax(z)</text>
  <text x="130" y="970" class="body">Categorical cross-entropy compares the predicted option scores against the correct label A / B / C.</text>
  <text x="130" y="1006" class="body">Training details used on the poster: AdamW optimizer, grouped BBPE inputs, 4 encoder layers, 8 heads, model dimension 256.</text>
  <text x="130" y="1042" class="small">This section fills the “layers / category loss / general explanation” gap noted in the project PDF.</text>
</svg>